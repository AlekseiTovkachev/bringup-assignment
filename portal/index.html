<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>פורטל לקוחות ברינגאפ</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="lookup-panel" aria-labelledby="portal-title">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">ב</div>
          <div>
            <p class="eyebrow">ברינגאפ</p>
            <h1 id="portal-title">פורטל תיק לקוח</h1>
          </div>
        </div>

        <form class="lookup-form" id="lookup-form">
          <label for="client-picker">בחירת לקוח לדמו</label>
          <select id="client-picker" name="client-picker" dir="rtl">
            <option value="">טוען לקוחות...</option>
          </select>

          <label for="tax-id">ח.פ / מספר מזהה</label>
          <div class="lookup-control">
            <input
              id="tax-id"
              name="tax-id"
              type="text"
              inputmode="numeric"
              autocomplete="off"
              placeholder="הזינו ח.פ או מספר מזהה"
            />
            <button type="submit">הצגת התיק</button>
          </div>
          <p class="hint">מוצגים רק סטטוס התיק, בקשות פתוחות ועדכונים הרלוונטיים ללקוח.</p>
        </form>
      </section>

      <section class="result-panel" id="result-panel" aria-live="polite">
        <div class="empty-state">
          <div class="empty-visual" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <h2>הזינו ח.פ או מספר מזהה כדי לצפות בתיק הלקוח.</h2>
          <p>הפורטל מציג את סטטוס הקליטה, בקשות פתוחות ואפשרות לשליחת עדכון קצר.</p>
        </div>
      </section>
    </main>

    <template id="client-template">
      <article class="client-view">
        <header class="client-header">
          <div>
            <p class="eyebrow">תיק לקוח</p>
            <h2 data-client-name></h2>
            <p class="muted" data-client-meta></p>
          </div>
          <div class="client-header-side">
            <div class="status-pill" data-status-pill></div>
            <div class="accountant-panel" data-accountant-panel>
              <span>רואה/ת חשבון מטפל/ת</span>
              <strong data-accountant-name></strong>
            </div>
          </div>
        </header>

        <section class="progress-section" aria-labelledby="progress-heading">
          <h3 id="progress-heading">התקדמות קליטה</h3>
          <ol class="progress-track" data-progress-track></ol>
        </section>

        <section class="task-section" aria-labelledby="tasks-heading">
          <div class="section-heading">
            <h3 id="tasks-heading">משימות ובקשות פתוחות</h3>
            <span data-task-count></span>
          </div>
          <div class="task-list" data-task-list></div>
        </section>

        <section class="response-section" aria-labelledby="response-heading">
          <h3 id="response-heading">שליחת עדכון</h3>
          <form class="response-form" data-response-form>
            <fieldset class="response-type-group">
              <legend>סוג עדכון</legend>
              <label>
                <input type="radio" name="response-type" value="מסמכים נשלחו" checked />
                <span>המסמכים נשלחו</span>
              </label>
              <label>
                <input type="radio" name="response-type" value="תגובה התקבלה" />
                <span>השבתי עם המידע שהתבקש</span>
              </label>
              <label>
                <input type="radio" name="response-type" value="דורש בדיקה" />
                <span>נא לבדוק את העדכון האחרון שלי</span>
              </label>
            </fieldset>

            <label for="response-details">פירוט</label>
            <textarea
              id="response-details"
              name="response-details"
              rows="4"
              placeholder="כתבו הערה קצרה לרואה/ת החשבון"
            ></textarea>

            <button type="submit">שליחת עדכון</button>
            <p class="response-message" data-response-message></p>
          </form>
        </section>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
